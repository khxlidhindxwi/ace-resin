<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="30%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7be6ff" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#1a8fb8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a4d6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="72%" cy="62%" r="45%">
      <stop offset="0%" stop-color="#5cffb3" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#15a36e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d3a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="52%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#b478ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a0e6e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="20%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#ff7ad9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3a0e2c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g5" cx="88%" cy="22%" r="28%">
      <stop offset="0%" stop-color="#ffd86b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a2a0e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#0b0414"/>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#g2)"/>
  <rect width="1600" height="900" fill="url(#g3)"/>
  <rect width="1600" height="900" fill="url(#g4)"/>
  <rect width="1600" height="900" fill="url(#g5)"/>

  <!-- swirl veins -->
  <g filter="url(#blur)" opacity="0.55">
    <path d="M-50 320 C 200 180, 480 460, 760 340 S 1280 200, 1700 360" stroke="#ffffff" stroke-width="3" fill="none"/>
    <path d="M-50 460 C 240 360, 520 580, 820 480 S 1320 360, 1700 520" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M-50 620 C 260 540, 540 720, 840 640 S 1340 540, 1700 700" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.6"/>
  </g>

  <!-- gold metallic ribbon -->
  <g opacity="0.85" filter="url(#blur)">
    <path d="M-50 240 C 260 100, 540 320, 880 220 S 1300 60, 1700 240" stroke="#ffd86b" stroke-width="6" fill="none" opacity="0.8"/>
    <path d="M-50 730 C 260 620, 580 820, 900 720 S 1320 580, 1700 760" stroke="#ffd86b" stroke-width="4" fill="none" opacity="0.6"/>
  </g>

  <!-- glossy top sheen -->
  <rect width="1600" height="900" fill="url(#sheen)"/>
</svg>
